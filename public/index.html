<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard to Natural English</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f5efe6 0%, #dbeafe 100%);
      --panel: rgba(255, 255, 255, 0.88);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --border: rgba(15, 118, 110, 0.15);
      --shadow: 0 20px 50px rgba(31, 41, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .section {
      margin-top: 22px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-strong);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border: 1px solid rgba(15, 118, 110, 0.2);
      border-radius: 18px;
      padding: 16px;
      font: inherit;
      resize: vertical;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-wrap {
      position: relative;
    }

    .clear-inline {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent-strong);
      box-shadow: none;
      border: 1px solid rgba(15, 118, 110, 0.14);
      font-size: 18px;
      line-height: 1;
    }

    .clear-inline.hidden {
      display: none;
    }

    input {
      width: 100%;
      border: 1px solid rgba(15, 118, 110, 0.2);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus,
    input:focus {
      border-color: rgba(15, 118, 110, 0.45);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.08);
    }

    .actions {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .button-row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .button-row.secondary {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr);
    }

    button {
      border: 0;
      border-radius: 999px;
      min-height: 52px;
      width: 100%;
      padding: 14px 20px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.2);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }

    .status {
      min-height: 22px;
      padding: 0 4px;
      font-size: 14px;
      color: var(--muted);
    }

    .output {
      min-height: 180px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(15, 118, 110, 0.14);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .output.hidden {
      display: none;
    }

    .result-card {
      margin-top: 14px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(15, 118, 110, 0.12);
    }

    .result-card.hidden {
      display: none;
    }

    .result-title {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-strong);
      letter-spacing: 0.02em;
    }

    .result-body {
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .result-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-actions.hidden {
      display: none;
    }

    .result-action {
      width: auto;
      min-height: 0;
      padding: 10px 14px;
      font-size: 14px;
      box-shadow: none;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
    }

    .subactions {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ghost-button {
      background: rgba(15, 118, 110, 0.12);
      color: var(--accent-strong);
      box-shadow: none;
      border: 1px solid rgba(15, 118, 110, 0.16);
    }

    .ghost-button:disabled {
      opacity: 0.45;
    }

    .keywords {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 24px;
    }

    .keyword-chip {
      width: auto;
      min-height: 0;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
      color: #1d4ed8;
      box-shadow: none;
      border: 1px solid rgba(37, 99, 235, 0.12);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        border-radius: 22px;
        padding: 20px;
      }

      .button-row,
      .button-row.secondary {
        grid-template-columns: 1fr;
      }

      button {
        min-height: 50px;
      }

      .clear-inline {
        top: 10px;
        right: 10px;
        width: 32px;
        min-height: 32px;
      }

      .subactions {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>一键粘贴，自动润色成英文</h1>
    <p>点击按钮后，页面会读取你的剪贴板内容，放进输入框，并调用 AI 大模型把它改写成更自然、更地道的英语。</p>

    <section class="section">
      <label for="sourceText">原文</label>
      <div class="input-wrap">
        <textarea id="sourceText" placeholder="点击下方按钮后，这里会自动填入剪贴板内容。"></textarea>
        <button id="clearInlineButton" class="clear-inline hidden" type="button" aria-label="清空输入框">×</button>
      </div>
    </section>

    <div class="actions">
      <div class="button-row">
        <button id="pasteButton" type="button">点击粘贴</button>
        <button id="translateButton" type="button">直接翻译</button>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </div>

    <section class="section">
      <label for="translatedText">更地道的英文</label>
      <div id="translatedText" class="output">翻译结果会显示在这里。</div>
      <div id="translationActions" class="result-actions">
        <button id="speakTranslationButton" class="ghost-button result-action" type="button" disabled>播放读音</button>
        <button id="copyTranslationButton" class="ghost-button result-action" type="button" disabled>复制结果</button>
      </div>
      <div id="correctedCard" class="result-card hidden">
        <div class="result-title">语法纠正</div>
        <div id="correctedText" class="result-body"></div>
        <div class="result-actions">
          <button id="speakCorrectedButton" class="ghost-button result-action" type="button" disabled>播放读音</button>
          <button id="copyCorrectedButton" class="ghost-button result-action" type="button" disabled>复制结果</button>
        </div>
      </div>
      <div id="polishedCard" class="result-card hidden">
        <div class="result-title">更地道的英文</div>
        <div id="polishedText" class="result-body"></div>
        <div class="result-actions">
          <button id="speakPolishedButton" class="ghost-button result-action" type="button" disabled>播放读音</button>
          <button id="copyPolishedButton" class="ghost-button result-action" type="button" disabled>复制结果</button>
        </div>
      </div>
      <div id="colloquialCard" class="result-card hidden">
        <div class="result-title">更口语化的表达</div>
        <div id="colloquialText" class="result-body"></div>
        <div class="result-actions">
          <button id="speakColloquialButton" class="ghost-button result-action" type="button" disabled>播放读音</button>
          <button id="copyColloquialButton" class="ghost-button result-action" type="button" disabled>复制结果</button>
        </div>
      </div>
      <div class="section">
        <label for="keywords">英语关键词</label>
        <div id="keywords" class="keywords">翻译完成后会自动提取关键词，点击即可发音。</div>
      </div>
      <p class="hint">提示：浏览器通常要求在 HTTPS 或 localhost 环境下授权读取剪贴板；部署时把 OpenAI Key 配到 Cloudflare 环境变量里。</p>
    </section>
  </main>

  <script>
    const pasteButton = document.getElementById("pasteButton");
    const translateButton = document.getElementById("translateButton");
    const clearInlineButton = document.getElementById("clearInlineButton");
    const sourceText = document.getElementById("sourceText");
    const translatedText = document.getElementById("translatedText");
    const speakTranslationButton = document.getElementById("speakTranslationButton");
    const copyTranslationButton = document.getElementById("copyTranslationButton");
    const correctedCard = document.getElementById("correctedCard");
    const correctedText = document.getElementById("correctedText");
    const speakCorrectedButton = document.getElementById("speakCorrectedButton");
    const copyCorrectedButton = document.getElementById("copyCorrectedButton");
    const polishedCard = document.getElementById("polishedCard");
    const polishedText = document.getElementById("polishedText");
    const speakPolishedButton = document.getElementById("speakPolishedButton");
    const copyPolishedButton = document.getElementById("copyPolishedButton");
    const colloquialCard = document.getElementById("colloquialCard");
    const colloquialText = document.getElementById("colloquialText");
    const speakColloquialButton = document.getElementById("speakColloquialButton");
    const copyColloquialButton = document.getElementById("copyColloquialButton");
    const keywordsContainer = document.getElementById("keywords");
    const statusText = document.getElementById("status");
    const stopWords = new Set([
      "a", "an", "and", "are", "as", "at", "be", "but", "by", "for", "from",
      "has", "have", "he", "her", "his", "i", "if", "in", "into", "is", "it",
      "its", "me", "my", "of", "on", "or", "our", "she", "that", "the", "their",
      "them", "there", "they", "this", "to", "us", "was", "we", "were", "will",
      "with", "you", "your"
    ]);
    function setStatus(message, isError = false) {
      statusText.textContent = message;
      statusText.style.color = isError ? "#b91c1c" : "#6b7280";
    }

    function syncClearButtonVisibility() {
      clearInlineButton.classList.toggle("hidden", !sourceText.value.trim());
    }

    function updateKeywordList(text) {
      keywordsContainer.innerHTML = "";

      const keywords = Array.from(
        new Set(
          (text.toLowerCase().match(/[a-z][a-z'-]*/g) || [])
            .filter((word) => word.length > 2)
            .filter((word) => !stopWords.has(word))
        )
      ).slice(0, 8);

      if (keywords.length === 0) {
        keywordsContainer.textContent = "暂时没有提取到可用关键词。";
        return;
      }

      for (const keyword of keywords) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "keyword-chip";
        chip.textContent = keyword;
        chip.addEventListener("click", () => speakText(keyword));
        keywordsContainer.appendChild(chip);
      }
    }

    function setResultVisibility(isEnglishMode) {
      translatedText.classList.toggle("hidden", isEnglishMode);
      document.getElementById("translationActions").classList.toggle("hidden", isEnglishMode);
      correctedCard.classList.toggle("hidden", !isEnglishMode);
      polishedCard.classList.toggle("hidden", !isEnglishMode);
      colloquialCard.classList.toggle("hidden", !isEnglishMode);
    }

    function setButtonEnabled(button, value) {
      button.disabled = !value.trim();
    }

    function setTranslationResult(result) {
      if (result.mode === "english") {
        translatedText.textContent = "已识别为英文输入，下方提供语法纠正和更地道版本。";
        correctedText.textContent = result.corrected;
        polishedText.textContent = result.polished;
        colloquialText.textContent = result.colloquial;
        updateKeywordList(result.colloquial || result.polished || result.corrected);
        setResultVisibility(true);
      } else {
        translatedText.textContent = result.translation;
        correctedText.textContent = "";
        polishedText.textContent = "";
        colloquialText.textContent = "";
        updateKeywordList(result.translation);
        setResultVisibility(false);
      }

      setButtonEnabled(speakTranslationButton, result.translation);
      setButtonEnabled(copyTranslationButton, result.translation);
      setButtonEnabled(speakCorrectedButton, result.corrected);
      setButtonEnabled(copyCorrectedButton, result.corrected);
      setButtonEnabled(speakPolishedButton, result.polished);
      setButtonEnabled(copyPolishedButton, result.polished);
      setButtonEnabled(speakColloquialButton, result.colloquial);
      setButtonEnabled(copyColloquialButton, result.colloquial);
    }

    function clearTranslationState(message) {
      translatedText.textContent = message;
      translatedText.classList.remove("hidden");
      correctedText.textContent = "";
      polishedText.textContent = "";
      colloquialText.textContent = "";
      setResultVisibility(false);
      [
        speakTranslationButton,
        copyTranslationButton,
        speakCorrectedButton,
        copyCorrectedButton,
        speakPolishedButton,
        copyPolishedButton,
        speakColloquialButton,
        copyColloquialButton
      ].forEach((button) => {
        button.disabled = true;
      });
      keywordsContainer.textContent = "翻译完成后会自动提取关键词，点击即可发音。";
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    async function copyText(text) {
      const cleanedText = text.trim();
      if (!cleanedText) {
        setStatus("没有可复制的内容。", true);
        return;
      }

      try {
        await navigator.clipboard.writeText(cleanedText);
        setStatus("已复制到剪贴板。");
      } catch {
        setStatus("复制失败，请检查浏览器权限。", true);
      }
    }

    function getEnglishVoice() {
      const voices = window.speechSynthesis?.getVoices?.() || [];
      return voices.find((voice) => voice.lang.toLowerCase().startsWith("en")) || null;
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) {
        setStatus("当前浏览器不支持语音朗读。", true);
        return;
      }

      const cleanedText = text.trim();
      if (!cleanedText) {
        setStatus("没有可播放的内容。", true);
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(cleanedText);
      const voice = getEnglishVoice();
      if (voice) {
        utterance.voice = voice;
        utterance.lang = voice.lang;
      } else {
        utterance.lang = "en-US";
      }
      utterance.rate = 0.95;
      window.speechSynthesis.speak(utterance);
    }

    async function translateToEnglish(text) {
      const response = await fetch("/api/translate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          text
        })
      });

      if (!response.ok) {
        let errorMessage = "调用 OpenAI 接口失败";

        try {
          const errorData = await response.json();
          errorMessage = errorData?.error?.message || errorMessage;
        } catch {
          // Ignore JSON parse failures and keep the fallback message.
        }

        if (errorMessage === "internal error") {
          errorMessage = "本地 Cloudflare 运行时返回 internal error。请优先检查 wrangler 版本，或确认 OpenAI 账号额度是否充足。";
        }

        throw new Error(errorMessage);
      }

      const data = await response.json();
      const mode = data?.mode;
      const translation = data?.translation?.trim() || "";
      const corrected = data?.corrected?.trim() || "";
      const polished = data?.polished?.trim() || "";
      const colloquial = data?.colloquial?.trim() || "";

      if (!mode) {
        throw new Error("没有拿到处理结果");
      }

      return { mode, translation, corrected, polished, colloquial };
    }

    async function runTranslation(text, pendingStatus) {
      const cleanedText = text.trim();

      if (!cleanedText) {
        throw new Error("请输入要翻译的内容。");
      }

      sourceText.value = cleanedText;
      syncClearButtonVisibility();
      clearTranslationState("AI 正在润色成英文，请稍候...");
      setStatus(pendingStatus);

      const result = await translateToEnglish(cleanedText);
      setTranslationResult(result);
      setStatus("已完成翻译。");
    }

    async function handlePasteAndTranslate() {
      if (!navigator.clipboard?.readText) {
        setStatus("当前浏览器不支持剪贴板读取。", true);
        return;
      }

      pasteButton.disabled = true;
      translateButton.disabled = true;

      try {
        const clipboardText = await navigator.clipboard.readText();
        if (!clipboardText.trim()) {
          throw new Error("剪贴板里没有可用文本。");
        }

        await runTranslation(clipboardText, "正在读取剪贴板并调用 AI 翻译...");
      } catch (error) {
        clearTranslationState("暂时无法显示翻译结果。");
        setStatus(error.message || "处理失败，请稍后再试。", true);
      } finally {
        pasteButton.disabled = false;
        translateButton.disabled = false;
      }
    }

    async function handleDirectTranslate() {
      pasteButton.disabled = true;
      translateButton.disabled = true;

      try {
        await runTranslation(sourceText.value, "正在翻译当前输入内容...");
      } catch (error) {
        clearTranslationState("暂时无法显示翻译结果。");
        setStatus(error.message || "处理失败，请稍后再试。", true);
      } finally {
        pasteButton.disabled = false;
        translateButton.disabled = false;
      }
    }

    function handleClear() {
      sourceText.value = "";
      syncClearButtonVisibility();
      clearTranslationState("翻译结果会显示在这里。");
      setStatus("");
      sourceText.focus();
    }

    pasteButton.addEventListener("click", handlePasteAndTranslate);
    translateButton.addEventListener("click", handleDirectTranslate);
    clearInlineButton.addEventListener("click", handleClear);
    sourceText.addEventListener("input", syncClearButtonVisibility);
    speakTranslationButton.addEventListener("click", () => speakText(translatedText.textContent));
    copyTranslationButton.addEventListener("click", () => copyText(translatedText.textContent));
    speakCorrectedButton.addEventListener("click", () => speakText(correctedText.textContent));
    copyCorrectedButton.addEventListener("click", () => copyText(correctedText.textContent));
    speakPolishedButton.addEventListener("click", () => speakText(polishedText.textContent));
    copyPolishedButton.addEventListener("click", () => copyText(polishedText.textContent));
    speakColloquialButton.addEventListener("click", () => speakText(colloquialText.textContent));
    copyColloquialButton.addEventListener("click", () => copyText(colloquialText.textContent));
    syncClearButtonVisibility();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {};
      window.speechSynthesis.getVoices();
    }
  </script>
</body>
</html>
