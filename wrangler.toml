name = "aisugar"
compatibility_date = "2025-02-14"
main = "./src/worker.js"

[vars]
OPENAI_MODEL = "glm-4-flash"
OPENAI_API_BASE_URL = "https://open.bigmodel.cn/api/paas"
OPENAI_CHAT_COMPLETIONS_PATH = "/v4/chat/completions"

[secrets]
required = ["OPENAI_API_KEY"]

[assets]
directory = "./dist"
binding = "ASSETS"

# Fill in your real D1 database ID after creating the database.
[[d1_databases]]
binding = "TRANSLATIONS_DB"
database_name = "native-english-records"
database_id = "bb79867c-76e4-489f-8065-e0403f57cdc7"
preview_database_id = "bb79867c-76e4-489f-8065-e0403f57cdc7"
